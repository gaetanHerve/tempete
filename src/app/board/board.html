<div class="board">

  <div class="logo">
    <img class="logo" src="assets/logo.jpg" alt="Game Logo" style="max-width: 100%; max-height: 100%; object-fit: contain;" />
  </div>

  <div class="toolbar">
    <app-toolbar></app-toolbar>
  </div>

  <div class="middle-zone">
    <div class="stack">
      <app-stack></app-stack>
    </div>
    <div class="play-area">
      <app-play-area></app-play-area>
    </div>
    <div class="discard">
      <app-discard></app-discard>
    </div>
  </div>

  <div class="player">
    <app-hand [player]="player"></app-hand>
  </div>

</div>
