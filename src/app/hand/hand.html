<h2>{{ player() }} ({{ cards().length }})</h2>

<div class="cards-container" id="handDropList">

  @for (card of cards(); track card._id) {
    <app-card-component
      [card]="card"
      [actions]="actions"
      (play)="playCard($event, player()!)"
      (discard)="discard($event)">
    </app-card-component>
  }

</div>
