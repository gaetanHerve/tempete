<h2>HAND ({{ cards.length }})</h2>

<div class="cards-container" id="handDropList">

  @for (card of cards; track card.id) {
    <app-card-component
      [card]="card"
      [actions]="actions"
      (play)="playCard($event)"
      (discard)="discard($event)">
    </app-card-component>
  }

</div>
