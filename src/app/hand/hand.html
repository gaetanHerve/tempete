<h2>HAND ({{ cards.length }})</h2>

<div class="cards-container"
  id="handDropList"
  [cdkDropListConnectedTo]="['playAreaDropList', 'discardDropList']"
  cdkDropList
  (cdkDropListDropped)="drop($event)">

  @for (card of cards; track card.id) {
    <div class="card" cdkDrag [cdkDragData]="card">
      <div class="card-header">
        <h5 class="card-title mt-2">{{ card.title }}</h5>
        <img class="card-img-top" src={{card.imageUrl}} alt="Card image cap">
      </div>

      <div class="card-body">
        <p class="card-text">{{ card.description }}</p>
      </div>

      <div class="card-footer">
        <small>{{ card.moment }}</small>
      </div>

    </div>
  }

</div>
