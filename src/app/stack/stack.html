<h2>{{ 'zones.stack' | translate }} ({{ cards().length }})</h2>

<div class="cards-container">
  <div class="card">
    @if (cards().length === 0) {
      <div class="no-card-bg">
            <p class="no-card">{{ 'zones.no_card_stack' | translate }}</p>
      </div>
    } @else {
      <img class="card-img-top"
         src="assets/cards/card-back.png"
         alt="card-back cap">
    }
  </div>
</div>
