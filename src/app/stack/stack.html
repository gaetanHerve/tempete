<div class="cards-container">
  <div class="card">
    @if (cards().length === 0) {
      <div class="no-card-bg">
        <p class="no-card">{{ 'zones.no_card_stack' | translate }}</p>
      </div>
    } @else {
      <img class="card-img-top"
         src="assets/cards/card-back.png"
         alt="card-back cap">
    }
  </div>
</div>

<div class="zone-header centered">
  <span>{{ 'zones.stack' | translate }} ({{ cards().length }})</span>
</div>

<div class="centered">
  <button class="btn btn-sm btn-outline-secondary"
          [disabled]="cards().length === 0"
          (click)="showBrowser.set(true)">
    {{ 'zones.view_all' | translate }}
  </button>
</div>

@if (showBrowser()) {
  <app-zone-browser
    [cards]="cards()"
    [zoneKey]="'zones.stack'"
    (closed)="showBrowser.set(false)">
  </app-zone-browser>
}
