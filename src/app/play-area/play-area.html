<h2>PLAY AREA ({{ cards.length }})</h2>

<div class="cards-container">

  <div class="card"
    cdkDropList
    id="playAreaDropList"
    [cdkDropListConnectedTo]="['handDropList']"
    (cdkDropListDropped)="drop($event)">
    
    @if (cards.length > 0) {
      @let card = cards[cards.length - 1];
      <div class="card-header">
        <h5 class="card-title mt-2">{{ card.title }}</h5>
        <img class="card-img-top" src={{card.imageUrl}} alt="Card image cap">
      </div>

      <div class="card-body">
        <p class="card-text">{{ card.description }}</p>
      </div>

      <div class="card-footer">
        <small>{{ card.moment }}</small>
      </div>

      <!-- <div class="card-header"> -->
        <!-- <img class="card-img-top" src={{ cards[cards.length - 1].imageUrl }} alt="Card image cap"> -->
      <!-- </div>

      <div class="card-body">
        <h5 class="card-title">{{ cards[cards.length - 1].title }} (id: {{ cards[cards.length - 1].id }})</h5>
        <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
        <div class="actions">
          <button type="button" class="play-btn btn btn-outline-success m-1" (click)="confirm(cards[cards.length - 1].id)">Confirm</button>
          <button type="button" class="discard-btn btn btn-outline-danger m-1" (click)="takeBack(cards[cards.length - 1].id)">Take Back</button>
        </div>
      </div> -->
    } @else {
      <p class="no-card">No card in play area.</p>
    }
  </div>
</div>
