<div class="cards-container">
  <div class="card" id="playAreaDropList">
    @if (cards().length > 0 && card() != undefined) {
      <app-card-component [card]="card()!"
        [actions]="actions()"
        (discard)="discard($event)"
        (browse)="browse($event)">
      </app-card-component>
    } @else {
      <p class="no-card">{{ 'zones.no_card_play_area' | translate }}</p>
    }
  </div>
</div>

<div class="zone-header centered">
  <span>{{ 'zones.play_area' | translate }} ({{ cards().length }})</span>
</div>

<div class="centered">
  <button class="btn btn-sm btn-outline-secondary"
          [disabled]="cards().length === 0"
          (click)="showBrowser.set(true)">
    {{ 'zones.view_all' | translate }}
  </button>
</div>

@if (showBrowser()) {
  <app-zone-browser
    [cards]="cards()"
    [zoneKey]="'zones.play_area'"
    (closed)="showBrowser.set(false)">
  </app-zone-browser>
}
